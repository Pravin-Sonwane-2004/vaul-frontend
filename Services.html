<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BackendDev</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="child-1" style="text-align: left;">
                <a href="home.html" style="text-decoration: none; color: #ffffff;">
                    <h1 id="homepage">BackendDev</h1>
                </a>
            </div>

            <div class="child-2">
                <ul>
                    <li><a href="Home.html">Home</a></li>
                    <li><a href="#">Products</a></li>
                    <li><a href="Services.html">Services</a></li>
                    <li><a href="#">Feedbacks</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </div>

            <div class="child-3">
                <div class="username" style="padding-right: 15px;">
                    <h1 style="font-size: large; padding: 10px;">username</h1>
                </div>

                <a href="/profile">
                    <img
                        src="https://static.vecteezy.com/system/resources/thumbnails/024/553/534/small/lion-head-logo-mascot-wildlife-animal-illustration-generative-ai-png.png"
                        alt="profile"
                        style="height: 40px; border: 1px solid #000;"
                    />
                </a>
            </div>
        </header>

        <div class="flot-class">
            <div class="flot-class-child-1">
                <img src="/images/2024 Ford Mustang Car aesthetic _ Cool cars _ car wallpapers.jpg" alt="image" id="c1" />
                <img src="/images/Shelby Mustang.jpg" alt="image" id="c1" />
                <img src="/images/♡.jpg" alt="image" id="c1" />
            </div>
        </div>

        <!-- User Form Section -->
        <div >
            <h2>Add User</h2>

            <div style="margin-bottom: 10px;">
                <label for="name">Name:</label><br />
                <input type="text" id="name" placeholder="Enter name" />
            </div>

            <div style="margin-bottom: 10px;">
                <label for="email">Email:</label><br />
                <input type="email" id="email" placeholder="Enter email" />
            </div>

            <div style="margin-bottom: 10px;">
                <label for="password">Password:</label><br />
                <input type="password" id="password" placeholder="Enter password" />
            </div>

            <button id="submit_user">Submit</button>
            <button id="get-data-button" type="button">Get All Users</button>
        </div>

        <!-- Users Table -->
        <div">
            <h2>Users List</h2>

            <table border="1" cellpadding="10" cellspacing="0" style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Password</th>
                    </tr>
                </thead>
                <tbody id="table_row"></tbody>
            </table>
        </div>
    </div>

    <script>
        const header = document.querySelector(".header");
        header.style.backgroundColor = "black";
    </script>

    <script type="module" src="apis.js"></script>
</body>
</html>
